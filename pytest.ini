[pytest]
minversion = 8.0
testpaths = tests
bdd_features_base_dir = tests/features
markers =
    smoke: smoke-tier scenarios
    sanity: sanity-tier scenarios
    regression: regression-tier scenarios
    auth: authentication scenarios
    auth_setup: produces a storage_state file (run first)
    navigation: navigation/route scenarios
    validation: form/field validation scenarios
    edge: edge-case scenarios
    rbac: role-based access scenarios
    e2e: end-to-end happy-path scenarios
addopts = -ra --strict-markers --tb=short
filterwarnings = ignore::DeprecationWarning
